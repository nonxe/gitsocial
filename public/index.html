<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="GitSocial — A beautiful iOS dark-themed social media platform" />
  <title>GitSocial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <!-- ==================== HEADER ==================== -->
    <header class="header" id="header">
      <div class="header-inner">
        <h1 class="header-logo">
          <span class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <defs>
                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#0A84FF"/>
                  <stop offset="100%" style="stop-color:#BF5AF2"/>
                </linearGradient>
              </defs>
              <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
              <path d="M9 18c-4.51 2-5-2-7-2"/>
            </svg>
          </span>
          <span class="logo-text">GitSocial</span>
        </h1>
        <button class="header-btn" id="refreshBtn" aria-label="Refresh feed">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
            <path d="M16 16h5v5"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ==================== FEED ==================== -->
    <main class="feed" id="feed">
      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="9" cy="9" r="2"/>
            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
          </svg>
        </div>
        <h3>No posts yet</h3>
        <p>Be the first to share something amazing</p>
      </div>

      <!-- Skeleton loaders (shown while loading) -->
      <div class="skeletons" id="skeletons">
        <div class="skeleton-card">
          <div class="skeleton-header">
            <div class="skeleton-avatar shimmer"></div>
            <div class="skeleton-lines">
              <div class="skeleton-line shimmer" style="width:120px"></div>
              <div class="skeleton-line short shimmer" style="width:80px"></div>
            </div>
          </div>
          <div class="skeleton-image shimmer"></div>
          <div class="skeleton-body">
            <div class="skeleton-line shimmer" style="width:60%"></div>
            <div class="skeleton-line shimmer" style="width:40%"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-header">
            <div class="skeleton-avatar shimmer"></div>
            <div class="skeleton-lines">
              <div class="skeleton-line shimmer" style="width:100px"></div>
              <div class="skeleton-line short shimmer" style="width:60px"></div>
            </div>
          </div>
          <div class="skeleton-image shimmer"></div>
          <div class="skeleton-body">
            <div class="skeleton-line shimmer" style="width:80%"></div>
            <div class="skeleton-line shimmer" style="width:50%"></div>
          </div>
        </div>
      </div>

      <!-- Posts container (dynamically populated) -->
      <div class="posts" id="postsContainer"></div>
    </main>

    <!-- ==================== UPLOAD MODAL ==================== -->
    <div class="modal-overlay" id="uploadOverlay">
      <div class="upload-modal" id="uploadModal">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <button class="modal-close-btn" id="modalCloseBtn">Cancel</button>
          <h2 class="modal-title">New Post</h2>
          <button class="modal-share-btn" id="shareBtn" disabled>Share</button>
        </div>

        <div class="modal-body">
          <!-- Drop Zone -->
          <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept="image/*,video/*" hidden />
            <div class="drop-zone-content" id="dropZoneContent">
              <div class="drop-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
              </div>
              <p class="drop-text">Tap to select or drag &amp; drop</p>
              <p class="drop-hint">Images and videos • Max 200MB</p>
            </div>
            <!-- File preview (hidden initially) -->
            <div class="file-preview" id="filePreview" hidden>
              <img id="previewImage" alt="Preview" />
              <video id="previewVideo" muted loop hidden></video>
              <button class="remove-file-btn" id="removeFileBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"/>
                  <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Caption -->
          <div class="form-group">
            <textarea
              id="captionInput"
              class="caption-input"
              placeholder="Write a caption..."
              rows="3"
              maxlength="500"
            ></textarea>
            <span class="char-count" id="charCount">0/500</span>
          </div>

          <!-- Password -->
          <div class="form-group">
            <div class="password-field">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="field-icon">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                type="password"
                id="passwordInput"
                class="password-input"
                placeholder="Enter upload password"
                autocomplete="off"
              />
            </div>
          </div>
        </div>

        <!-- Upload Progress -->
        <div class="upload-progress" id="uploadProgress" hidden>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <p class="progress-text" id="progressText">Uploading to Catbox...</p>
        </div>
      </div>
    </div>

    <!-- ==================== BOTTOM TAB BAR ==================== -->
    <nav class="tab-bar" id="tabBar">
      <button class="tab-item active" data-tab="home" id="tabHome">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <path d="M12.71 2.29a1 1 0 00-1.42 0l-9 9a1 1 0 000 1.42A1 1 0 003 13h1v7a2 2 0 002 2h12a2 2 0 002-2v-7h1a1 1 0 00.71-1.71zM9 20v-5a1 1 0 011-1h4a1 1 0 011 1v5z"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="tab-item" data-tab="search" id="tabSearch">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>Explore</span>
      </button>
      <button class="tab-item upload-tab" data-tab="upload" id="tabUpload">
        <div class="upload-btn-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </div>
      </button>
      <button class="tab-item" data-tab="activity" id="tabActivity">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
        </svg>
        <span>Activity</span>
      </button>
      <button class="tab-item" data-tab="profile" id="tabProfile">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Profile</span>
      </button>
    </nav>

    <!-- ==================== TOAST CONTAINER ==================== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ==================== DELETE CONFIRM MODAL ==================== -->
    <div class="confirm-overlay" id="confirmOverlay" hidden>
      <div class="confirm-dialog">
        <div class="confirm-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#FF453A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
            <line x1="10" y1="11" x2="10" y2="17"/>
            <line x1="14" y1="11" x2="14" y2="17"/>
          </svg>
        </div>
        <h3>Delete Post?</h3>
        <p>This action cannot be undone.</p>
        <div class="form-group" style="margin-top:12px;">
          <div class="password-field">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="field-icon">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="deletePasswordInput" class="password-input" placeholder="Enter password to delete" autocomplete="off" />
          </div>
        </div>
        <div class="confirm-actions">
          <button class="confirm-cancel" id="confirmCancel">Cancel</button>
          <button class="confirm-delete" id="confirmDelete">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
